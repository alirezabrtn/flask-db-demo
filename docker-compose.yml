services:
  flask-db-demo:
    image: alirezabrtn/flask-db-demo:latest
    restart: always
    ports:
      - "5000:5000"
    networks:
      - flask-db-demo-net
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/flask-db-demo
    depends_on:
      - db
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flask-db-demo
    networks:
      - flask-db-demo-net
networks:
  flask-db-demo-net: